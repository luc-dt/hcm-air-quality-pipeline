id: historical_backfill
namespace: hcm_pipeline
# Flow to upload historical air quality data to Google Cloud Storage.

tasks:
  # Task to upload the local historical CSV file (data/air_quality_historical.csv) to GCS bronze layer using Python.
  - id: upload_historical
    type: io.kestra.plugin.scripts.python.Script
    timeout: PT10M
    retry:
      type: exponential
      maxAttempts: 3
      initialDelay: PT30S
      maxDelay: PT5M
    containerImage: python:3.11-alpine
    beforeCommands:
      - pip install google-cloud-storage --quiet
    namespaceFiles:
      enabled: true
    env:
      GCP_CREDS: "{{kv('GCP_CREDS')}}"
    script: |
      import json
      import os
      from google.cloud import storage
      from google.oauth2 import service_account

      sa_key = json.loads(os.environ["GCP_CREDS"])
      credentials = service_account.Credentials.from_service_account_info(sa_key)
      client = storage.Client(credentials=credentials, project="de-zoomcamp-2026-486008")

      bucket = client.bucket("hcm-air-quality-486008")
      blob = bucket.blob("bronze/historical/air_quality_historical.csv")
      blob.upload_from_filename("data/air_quality_historical.csv", content_type="text/csv")
      print("Uploaded to gs://hcm-air-quality-486008/bronze/historical/air_quality_historical.csv")